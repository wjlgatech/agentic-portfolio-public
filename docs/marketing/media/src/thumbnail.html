<!doctype html>
<!-- Article thumbnail, 1200×628 — Anthropic style: warm paper (Cloud #F0EEE6), serif display,
     ink text, ONE accent (Book Cloth coral #d97757). Single-accent by design: the muted
     Anthropic secondaries (olive/blue) fail chroma+CVD as adjacent marks, so they aren't used. -->
<html><head><meta charset="utf-8"><style>
  * { margin:0; box-sizing:border-box; }
  body { width:1200px; height:628px;
         font-family:ui-sans-serif,system-ui,"Segoe UI",Helvetica,Arial,sans-serif;
         background:#F0EEE6; color:#191919;
         display:flex; flex-direction:column; justify-content:space-between; padding:64px 80px;
         position:relative; overflow:hidden; }
  body::before { content:""; position:absolute; inset:0;
         background:radial-gradient(1100px 520px at 78% -8%, rgba(204,120,92,.18), transparent); }
  .eyebrow { font-size:26px; color:#b05730; letter-spacing:2.5px; text-transform:uppercase; font-weight:600; position:relative; }
  .title { font-family:"Iowan Old Style",Palatino,Georgia,"Times New Roman",serif;
           font-size:92px; font-weight:600; line-height:1.06; letter-spacing:-1px; position:relative; }
  .title .strike { position:relative; white-space:nowrap; }
  .title .strike::after { content:""; position:absolute; left:-2%; right:-2%; top:55%; height:7px;
                          background:#d97757; border-radius:4px; transform:rotate(-2deg); }
  .sub { font-size:36px; color:#6B6657; line-height:1.35; max-width:960px; margin-top:26px; position:relative; }
  .sub b { color:#191919; font-weight:600; }
  .foot { display:flex; justify-content:space-between; align-items:center; font-size:27px;
          border-top:1px solid #E2DED3; padding-top:26px; position:relative; }
  .foot .cta { color:#b05730; font-weight:600; }
  .foot .brand { color:#6B6657; }
</style></head><body>
  <div class="eyebrow">From dead document to living proof</div>
  <div>
    <div class="title">The <span class="strike">résumé</span> is dead.<br>Long live the living portfolio.</div>
    <div class="sub">A portfolio with its own AI agent — answers for you 24/7, shows receipts, honest about limits. <b>10 minutes. Free. No code.</b></div>
  </div>
  <div class="foot"><span class="cta">Make yours → agentic-portfolio-public.vercel.app</span><span class="brand">made free · agentic-portfolio</span></div>
</body></html>
